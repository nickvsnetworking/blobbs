<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blobbs — Tadpole Pond</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: #eafff4;
    background: #06231f;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #game { display: block; width: 100vw; height: 100vh; cursor: pointer; }

  .hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 20px; pointer-events: none;
    text-shadow: 0 2px 12px rgba(0,0,0,.5);
  }
  .stat { display: flex; flex-direction: column; line-height: 1; }
  .label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: .55; margin-bottom: 5px; }
  .value { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; }
  #frogs { color: #7dffa8; }

  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(4, 20, 18, .8); backdrop-filter: blur(6px);
    gap: 22px; padding: 24px; z-index: 10;
  }
  .overlay.hidden { display: none; }
  .title {
    font-size: clamp(46px, 12vw, 120px); font-weight: 900; letter-spacing: -3px;
    background: linear-gradient(180deg, #eafff4, #7dffa8 55%, #35d0a0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 6px 30px rgba(125,255,168,.35));
  }
  .subtitle { font-size: 16px; opacity: .78; max-width: 460px; line-height: 1.6; }
  .stages { display: flex; gap: 26px; align-items: flex-end; margin: 4px 0; opacity: .95; }
  .stages figure { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .stages canvas { display: block; }
  .stages figcaption { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: .6; }
  .arrow { align-self: center; font-size: 22px; opacity: .4; padding-bottom: 26px; }
  .big-score { font-size: 22px; }
  .big-score b { color: #7dffa8; font-size: 40px; }
  button {
    font: inherit; font-weight: 800; font-size: 20px; letter-spacing: 1px;
    color: #05231d; background: linear-gradient(180deg, #b6ffce, #7dffa8);
    border: none; border-radius: 999px; padding: 16px 44px; cursor: pointer;
    box-shadow: 0 10px 30px rgba(125,255,168,.32), inset 0 -3px 0 rgba(0,0,0,.15);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(125,255,168,.5); }
  button:active { transform: translateY(1px); }
  .hint { font-size: 13px; opacity: .5; }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div>
    <div class="stat" style="text-align:right;"><span class="label">Frogs freed</span><span class="value" id="frogs">0</span></div>
  </div>


  <div class="overlay" id="startScreen">
    <div class="title">Blobbs Tadpole Poker</div>
    <div class="stages" id="stagesDemo">
      <figure><canvas class="demo" data-stage="0" width="80" height="80"></canvas><figcaption>Tadpole</figcaption></figure>
      <span class="arrow">→</span>
      <figure><canvas class="demo" data-stage="1" width="80" height="80"></canvas><figcaption>Tadlet</figcaption></figure>
      <span class="arrow">→</span>
      <figure><canvas class="demo" data-stage="2" width="80" height="80"></canvas><figcaption>Frog</figcaption></figure>
      <span class="arrow">→</span>
      <figure><canvas class="demo" data-stage="3" width="80" height="80"></canvas><figcaption>Hop away!</figcaption></figure>
    </div>
    <div class="subtitle">Tap a tadpole to grow it into a tadlet, tap again for a frog, then one more tap and it hops off the screen. Grow them all — nurture the whole pond!</div>
    <button id="startBtn">Enter the pond</button>
    <div class="hint">Click or tap • relaxed, no timer</div>
  </div>

  <div class="overlay hidden" id="endScreen">
    <div class="title" style="font-size:clamp(36px,8vw,80px)">Nice pond!</div>
    <div class="big-score">Score <b id="finalScore">0</b></div>
    <div class="subtitle" id="endMsg"></div>
    <button id="againBtn">Again</button>
  </div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- audio ----------
  let audioCtx = null, soundOn = true;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  }
  function tone(freq, dur, type = "sine", vol = 0.22, glide = 1) {
    if (!soundOn || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * glide, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
  }
  const sfx = {
    grow(stage) { tone(300 + stage * 140, 0.14, "triangle", 0.24, 1.25); },
    ribbit() { tone(220, 0.12, "sawtooth", 0.18, 0.5); setTimeout(() => tone(180, 0.16, "sawtooth", 0.18, 0.6), 90); },
    hop() { tone(500, 0.28, "sine", 0.22, 2.4); },
    miss() { tone(120, 0.05, "square", 0.04, 1); },
  };

  // ---------- creatures ----------
  // stage 0 tadpole, 1 tadlet, 2 frog, 3 hopping away (leaving)
  const FROG_COLORS = ["#6fdc6f", "#7dffa8", "#8fd14f", "#57c99a", "#a3e635"];
  const STAGE_MULT = [1, 1.4, 2.0, 2.0]; // relative size of tadpole / tadlet / frog
  // little gentleman outfits — chosen per frog from its colour so it stays consistent
  const FROG_OUTFITS = [
    { vest: "#c85a6a", button: "#f4d58d", cravat: "#f6eede" }, // cranberry vest, cream cravat
    { vest: "#4f7cc0", button: "#f0d060", cravat: "#f6eede" }, // royal blue vest
    { vest: "#d59b3f", button: "#7a531c", cravat: "#8c3b52" }, // mustard vest, plum cravat
    { vest: "#7d5ba6", button: "#f0d060", cravat: "#f6eede" }, // plum vest
    { vest: "#c96b3f", button: "#f4d58d", cravat: "#39564c" }, // rust vest, forest cravat
    { vest: "#3f7d6a", button: "#f4d58d", cravat: "#e8b6c4" }, // teal vest, rose cravat
  ];
  // starts at 0, overshoots, settles at 1 — used for the "grow in" on spawn
  function easeOutBack(t) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
  const easeInCubic = (t) => t * t * t;
  let creatures = [], ripples = [], sparkles = [];
  let groodle = null, groodleTimer = 8; // the fluffy visitor who pokes her snout in
  let score = 0, frogsFreed = 0, running = false, lastT = 0, spawnAcc = 0;

  const el = {
    score: document.getElementById("score"),
    frogs: document.getElementById("frogs"),
    start: document.getElementById("startScreen"),
    end: document.getElementById("endScreen"),
    finalScore: document.getElementById("finalScore"),
    endMsg: document.getElementById("endMsg"),
  };

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnTadpole() {
    const baseR = rand(12, 17);
    creatures.push({
      x: rand(60, W - 60), y: rand(120, H - 80),
      stage: 0,
      baseR,               // mature tadpole radius
      age: 0,              // seconds alive as a swimmer (drives grow-in + growth)
      maturity: 1,         // slow size gain the longer it swims
      r: baseR * 0.14,     // born tiny, grows in
      dir: rand(0, Math.PI * 2),
      speed: rand(24, 46),
      wiggle: rand(0, Math.PI * 2),
      turnT: rand(0.6, 2),
      color: FROG_COLORS[(Math.random() * FROG_COLORS.length) | 0],
      pop: 0,            // squash-and-stretch pulse on tap
      blink: 0, blinkCooldown: rand(1, 5), blinkPhase: 0,
      // hop state
      hop: null,
    });
  }

  function ripple(x, y, color) { ripples.push({ x, y, r: 6, max: rand(40, 70), life: 1, color }); }

  // ---------- the groodle (a fluffy white muppet who sniffs the pond) ----------
  function groodleSize() { return Math.max(64, Math.min(W, H) * 0.09); }
  function groodleReach() { return Math.min(W * 0.13, 250); }
  function groodleTip(gr) {
    const noseR = groodleSize() * 0.42, y = gr.y + (gr.bob || 0);
    const into = -noseR + gr.depth * (groodleReach() + noseR);
    return gr.side === "left" ? { x: into, y } : { x: W - into, y };
  }
  function spawnGroodle() {
    groodle = {
      side: Math.random() < 0.5 ? "left" : "right",
      y: rand(H * 0.4, H * 0.72),
      phase: "in", t: 0, depth: 0, bob: 0, rippleAcc: 0, splashed: false,
    };
  }
  function updateGroodle(dt) {
    if (!groodle) { groodleTimer -= dt; if (groodleTimer <= 0) spawnGroodle(); return; }
    const gr = groodle, IN = 0.9, HOLD = 2.0, OUT = 0.85;
    gr.t += dt;
    if (gr.phase === "in") {
      gr.depth = easeOutCubic(Math.min(1, gr.t / IN));
      if (gr.t >= IN) { gr.phase = "hold"; gr.t = 0; }
    } else if (gr.phase === "hold") {
      gr.depth = 1; gr.bob = Math.sin(gr.t * 4.5) * 6;
      if (gr.t >= HOLD) { gr.phase = "out"; gr.t = 0; }
    } else {
      gr.depth = 1 - easeInCubic(Math.min(1, gr.t / OUT));
      if (gr.t >= OUT) { groodle = null; groodleTimer = rand(10, 20); return; }
    }
    // ripples spreading from where her wet nose dips into the water
    if (gr.depth > 0.22) {
      const tip = groodleTip(gr);
      if (!gr.splashed) { gr.splashed = true; ripple(tip.x, tip.y, "rgba(220,235,255,.6)"); ripple(tip.x, tip.y, "rgba(220,235,255,.4)"); }
      gr.rippleAcc += dt;
      while (gr.rippleAcc >= 0.19) { gr.rippleAcc -= 0.19; ripple(tip.x + rand(-6, 6), tip.y + rand(-4, 4), "rgba(210,230,255,.5)"); }
    } else { gr.splashed = false; }
  }
  function sparkle(x, y, color, n = 12) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, Math.PI * 2), sp = rand(40, 160);
      sparkles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, r: rand(2, 4), color });
    }
  }

  function tapAt(px, py) {
    ensureAudio();
    for (let i = creatures.length - 1; i >= 0; i--) {
      const c = creatures[i];
      if (c.stage === 3) continue; // already hopping away
      const hitR = c.r + 14 + c.stage * 4;
      const dx = px - c.x, dy = py - c.y;
      if (dx * dx + dy * dy <= hitR * hitR) {
        c.pop = 1;
        ripple(c.x, c.y, c.color);
        if (c.stage < 2) {
          c.stage++;
          score += 5 * c.stage;
          if (c.stage === 2) c.r = c.baseR * STAGE_MULT[2] * c.maturity; // lock frog size
          sfx.grow(c.stage);
          sparkle(c.x, c.y, c.color, 8);
        } else {
          // frog -> crouch, then explosive leap off screen
          c.stage = 3;
          const ang = -Math.PI / 2 + rand(-0.45, 0.45); // mostly up, slight sideways
          c.hop = {
            phase: "crouch", t: 0, crouch: 0, rot: 0,
            vx: 0, vy: 0,
            launchVx: Math.cos(ang) * rand(220, 340),
            launchVy: -rand(900, 1150),
          };
          score += 25;
          frogsFreed++;
          sfx.hop(); sfx.ribbit();
          sparkle(c.x, c.y, "#eafff4", 18);
        }
        updateHUD();
        return;
      }
    }
    sfx.miss();
    ripple(px, py, "rgba(180,255,220,.5)");
  }

  function updateHUD() {
    el.score.textContent = score;
    el.frogs.textContent = frogsFreed;
  }

  function update(dt) {
    spawnAcc += dt;
    // keep the pond populated; spawn until there are enough swimmers
    const desired = 7;
    const activeSwimmers = creatures.filter(c => c.stage < 3).length;
    if (activeSwimmers < desired && spawnAcc > 0.5) { spawnAcc = 0; spawnTadpole(); }

    for (let i = creatures.length - 1; i >= 0; i--) {
      const c = creatures[i];
      c.pop += (0 - c.pop) * Math.min(1, dt * 8);

      // occasional blink: idle, then a quick close-and-open (~0.16s)
      if (c.blinkCooldown > 0) { c.blinkCooldown -= dt; c.blink = 0; }
      else {
        c.blinkPhase += dt;
        const half = 0.08;
        if (c.blinkPhase < half) c.blink = c.blinkPhase / half;
        else if (c.blinkPhase < 2 * half) c.blink = 1 - (c.blinkPhase - half) / half;
        else { c.blink = 0; c.blinkPhase = 0; c.blinkCooldown = rand(2, 6); }
      }

      // tadpoles & tadlets are born tiny, grow in, then keep enlarging slowly with age
      if (c.stage <= 1) {
        c.age += dt;
        const popIn = easeOutBack(Math.max(0, Math.min(1, c.age / 0.5)));
        c.maturity = 1 + Math.min(c.age, 14) * 0.06; // up to ~+84% over its swimming life
        c.r = c.baseR * STAGE_MULT[c.stage] * popIn * c.maturity;
      }

      if (c.stage === 3) {
        const hp = c.hop;
        hp.t += dt;
        if (hp.phase === "crouch") {
          // anticipation: squash down before the launch
          hp.crouch = Math.min(1, hp.t / 0.13);
          if (hp.t >= 0.13) {
            hp.phase = "leap"; hp.t = 0;
            hp.vx = hp.launchVx; hp.vy = hp.launchVy;
            ripple(c.x, c.y + c.r, c.color); // splash push-off
          }
        } else {
          hp.crouch = 0;
          hp.vy += 2000 * dt; // gravity
          c.x += hp.vx * dt;
          c.y += hp.vy * dt;
          // face the direction of travel (art points "up", so offset by PI/2)
          hp.rot = Math.atan2(hp.vy, hp.vx) + Math.PI / 2;
          if (c.y < -80 || c.x < -80 || c.x > W + 80) creatures.splice(i, 1);
        }
        continue;
      }

      // swim: wander with occasional turns
      c.turnT -= dt;
      if (c.turnT <= 0) { c.dir += rand(-1, 1); c.turnT = rand(0.6, 2.2); }
      c.wiggle += dt * (6 + c.speed * 0.05);
      const wob = Math.sin(c.wiggle) * 0.35;
      const vx = Math.cos(c.dir + wob) * c.speed;
      const vy = Math.sin(c.dir + wob) * c.speed;
      c.x += vx * dt; c.y += vy * dt;

      // bounce off edges (keep in pond)
      const m = c.r + 20;
      if (c.x < m) { c.x = m; c.dir = Math.PI - c.dir; }
      if (c.x > W - m) { c.x = W - m; c.dir = Math.PI - c.dir; }
      if (c.y < 100 + c.r) { c.y = 100 + c.r; c.dir = -c.dir; }
      if (c.y > H - m) { c.y = H - m; c.dir = -c.dir; }
    }

    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r += (rp.max - rp.r) * Math.min(1, dt * 5);
      rp.life -= dt * 1.6;
      if (rp.life <= 0) ripples.splice(i, 1);
    }
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const s = sparkles[i];
      s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 200 * dt; s.vx *= 0.97;
      s.life -= dt * 1.8;
      if (s.life <= 0) sparkles.splice(i, 1);
    }
    updateGroodle(dt);
  }

  // ---------- drawing ----------
  function drawWater() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0b3b34");
    g.addColorStop(0.5, "#0d4b40");
    g.addColorStop(1, "#0a352e");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // caustic light streaks
    ctx.globalAlpha = 0.05;
    ctx.strokeStyle = "#bfffe0";
    ctx.lineWidth = 40;
    for (let i = 0; i < 5; i++) {
      const x = (i / 5) * W + (waterT * 12 % (W / 5));
      ctx.beginPath();
      ctx.moveTo(x, 0); ctx.lineTo(x + 120, H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // draw one creature at (x,y), size s. legKick is leg-extension delta (- = tucked, + = kicking).
  function drawCreature(g, x, y, s, stage, color, wiggle, pop, rot, crouch = 0, legKick = 0, blink = 0) {
    g.save();
    g.translate(x, y);
    if (rot) g.rotate(rot);
    // soft contact shadow in the water
    g.save();
    g.scale(1, 0.4);
    g.beginPath(); g.arc(0, s * 2.4, s * 1.1, 0, Math.PI * 2);
    g.fillStyle = "rgba(0,0,0,.16)"; g.fill();
    g.restore();
    // tap-pop squash, plus crouch anticipation
    const sx = (1 + pop * 0.22) * (1 + crouch * 0.35);
    const sy = (1 - pop * 0.14) * (1 - crouch * 0.42);
    g.scale(sx, sy);

    if (stage === 0 || stage === 1) drawTadpole(g, s, stage, wiggle);
    else drawFrog(g, s, color, legKick, blink);
    g.restore();
  }

  function drawTadpole(g, s, stage, wiggle) {
    const base = stage === 0 ? "#2c2c38" : "#4d6335";
    const swish = Math.sin(wiggle);
    const tailY = swish * s * 0.6;
    const tailLen = stage === 0 ? 2.5 : 1.8;
    const tipX = -s * tailLen;

    // translucent tail fin (membrane)
    const fin = g.createLinearGradient(-s * 0.5, 0, tipX, tailY);
    fin.addColorStop(0, stage === 0 ? "rgba(120,120,140,.5)" : "rgba(140,190,110,.5)");
    fin.addColorStop(1, "rgba(170,210,190,0)");
    g.fillStyle = fin;
    g.beginPath();
    g.moveTo(-s * 0.4, -s * 0.18);
    g.quadraticCurveTo(-s * 1.35, tailY - s, tipX, tailY);
    g.quadraticCurveTo(-s * 1.35, tailY + s, -s * 0.4, s * 0.18);
    g.closePath();
    g.fill();
    // tail core
    g.strokeStyle = shade(base, 4); g.lineWidth = s * 0.4; g.lineCap = "round";
    g.beginPath();
    g.moveTo(-s * 0.4, 0);
    g.quadraticCurveTo(-s * 1.2, tailY * 0.7, tipX * 0.92, tailY * 0.85);
    g.stroke();

    // sprouting hind legs on the tadlet
    if (stage === 1) {
      for (const dir of [-1, 1]) {
        g.strokeStyle = shade(base, -6); g.lineWidth = s * 0.24; g.lineCap = "round";
        g.beginPath();
        g.moveTo(-s * 0.45, dir * s * 0.35);
        g.quadraticCurveTo(-s * 1.05, dir * s * 0.85, -s * 0.8, dir * s * 1.2);
        g.stroke();
        g.fillStyle = shade(base, -6);
        g.beginPath(); g.arc(-s * 0.8, dir * s * 1.2, s * 0.17, 0, Math.PI * 2); g.fill();
      }
    }

    // body with volumetric shading
    const bg = g.createRadialGradient(-s * 0.3, -s * 0.35, s * 0.1, 0, 0, s * 1.15);
    bg.addColorStop(0, shade(base, 60));
    bg.addColorStop(0.5, base);
    bg.addColorStop(1, shade(base, -28));
    g.beginPath(); g.ellipse(0, 0, s * 1.05, s * 0.85, 0, 0, Math.PI * 2);
    g.fillStyle = bg; g.fill();
    // glossy highlight
    g.beginPath(); g.ellipse(-s * 0.28, -s * 0.34, s * 0.4, s * 0.2, -0.4, 0, Math.PI * 2);
    g.fillStyle = "rgba(255,255,255,.32)"; g.fill();

    // eyes
    tadEye(g, s * 0.48, -s * 0.18, s * 0.2);
    tadEye(g, s * 0.22, -s * 0.44, s * 0.17);
  }

  function tadEye(g, x, y, r) {
    g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2);
    g.fillStyle = "#f6fff8"; g.fill();
    g.beginPath(); g.arc(x + r * 0.18, y + r * 0.05, r * 0.55, 0, Math.PI * 2);
    g.fillStyle = "#12161c"; g.fill();
    g.beginPath(); g.arc(x + r * 0.02, y - r * 0.25, r * 0.22, 0, Math.PI * 2);
    g.fillStyle = "#fff"; g.fill();
  }

  function webFoot(g, x, y, dir, r, color) {
    // webbing
    g.beginPath();
    g.moveTo(x - r * dir * 0.7, y - r * 0.2);
    g.quadraticCurveTo(x + r * dir * 0.1, y + r * 1.2, x + r * dir * 0.9, y - r * 0.1);
    g.closePath();
    g.fillStyle = shade(color, -6); g.fill();
    // three toes
    g.fillStyle = shade(color, -14);
    for (const a of [-0.55, 0, 0.55]) {
      const tx = x + Math.sin(a) * r * dir * 1.15;
      const ty = y + Math.cos(a) * r * 0.9;
      g.beginPath(); g.arc(tx, ty, r * 0.4, 0, Math.PI * 2); g.fill();
    }
  }

  function drawFrog(g, s, color, legKick, blink) {
    blink = blink || 0;                 // 0 = eyes open, 1 = fully shut
    const ext = Math.max(0, legKick);   // 0 = folded/sitting, ~1 = mid-leap
    const dk = shade(color, -24), dker = shade(color, -42), lt = shade(color, 48);
    g.lineCap = "round"; g.lineJoin = "round";

    // ---- hind legs: folded "Z" when sitting, stretched back on a leap ----
    for (const dir of [-1, 1]) {
      const hipX = dir * s * 0.5,  hipY = s * 0.5;
      const kneeX = dir * (s * 1.15 + s * 0.35 * ext);         // knee sits up beside the body
      const kneeY = -s * 0.15 + s * 1.0 * ext;
      const footX = dir * (s * 0.7 + s * 0.85 * ext);          // foot splayed forward
      const footY = s * 1.0 + s * 0.75 * ext;
      // thigh (thick) then shin (thinner)
      g.strokeStyle = dk; g.lineWidth = s * 0.52;
      g.beginPath(); g.moveTo(hipX, hipY); g.lineTo(kneeX, kneeY); g.stroke();
      g.lineWidth = s * 0.34;
      g.beginPath(); g.moveTo(kneeX, kneeY);
      g.quadraticCurveTo(kneeX, (kneeY + footY) / 2, footX, footY); g.stroke();
      webFoot(g, footX, footY, dir, s * 0.4, color);
    }

    // ---- body: rounded, taller-than-wide sitting silhouette ----
    const bg = g.createRadialGradient(-s * 0.3, -s * 0.55, s * 0.2, 0, s * 0.2, s * 1.45);
    bg.addColorStop(0, lt);
    bg.addColorStop(0.55, color);
    bg.addColorStop(1, dk);
    g.beginPath(); g.ellipse(0, s * 0.12, s * 1.08, s * 1.02, 0, 0, Math.PI * 2);
    g.fillStyle = bg; g.fill();
    // soft rim light along the lower edge for volume
    g.beginPath(); g.ellipse(0, s * 0.2, s * 0.96, s * 0.86, 0, 0.12 * Math.PI, 0.88 * Math.PI);
    g.strokeStyle = "rgba(255,255,255,.14)"; g.lineWidth = s * 0.14; g.stroke();

    // ---- dapper waistcoat + cravat ----
    const outfit = FROG_OUTFITS[parseInt(color.slice(1), 16) % FROG_OUTFITS.length];
    // waistcoat: a V-neck vest over the belly
    g.beginPath();
    g.moveTo(0, s * 0.52);                                       // bottom of the V neckline
    g.quadraticCurveTo(-s * 0.30, s * 0.34, -s * 0.5, s * 0.2);  // up to left shoulder
    g.quadraticCurveTo(-s * 0.72, s * 0.62, -s * 0.5, s * 0.92); // down the left side
    g.quadraticCurveTo(-s * 0.26, s * 1.12, 0, s * 1.1);         // to the bottom point
    g.quadraticCurveTo(s * 0.26, s * 1.12, s * 0.5, s * 0.92);   // up the right side
    g.quadraticCurveTo(s * 0.72, s * 0.62, s * 0.5, s * 0.2);
    g.quadraticCurveTo(s * 0.30, s * 0.34, 0, s * 0.52);
    g.closePath();
    const vestG = g.createLinearGradient(0, s * 0.2, 0, s * 1.1);
    vestG.addColorStop(0, shade(outfit.vest, 26));
    vestG.addColorStop(1, shade(outfit.vest, -16));
    g.fillStyle = vestG; g.fill();
    g.lineWidth = s * 0.05; g.strokeStyle = shade(outfit.vest, -38); g.stroke();
    // centre seam + buttons
    g.beginPath(); g.moveTo(0, s * 0.56); g.lineTo(0, s * 1.02);
    g.lineWidth = s * 0.03; g.strokeStyle = shade(outfit.vest, -32); g.stroke();
    g.fillStyle = outfit.button;
    for (const by of [0.66, 0.82, 0.98]) { g.beginPath(); g.arc(0, s * by, s * 0.06, 0, Math.PI * 2); g.fill(); }
    // cravat: a puffy knot tucked into the V
    g.beginPath();
    g.moveTo(0, s * 0.19);
    g.quadraticCurveTo(-s * 0.23, s * 0.28, -s * 0.15, s * 0.5);
    g.quadraticCurveTo(0, s * 0.63, s * 0.15, s * 0.5);
    g.quadraticCurveTo(s * 0.23, s * 0.28, 0, s * 0.19);
    g.closePath();
    g.fillStyle = outfit.cravat; g.fill();
    g.strokeStyle = shade(outfit.cravat, -30); g.lineWidth = s * 0.025; g.stroke();
    // knot
    g.beginPath(); g.ellipse(0, s * 0.25, s * 0.16, s * 0.12, 0, 0, Math.PI * 2);
    g.fillStyle = shade(outfit.cravat, 20); g.fill();
    g.strokeStyle = shade(outfit.cravat, -25); g.lineWidth = s * 0.03;
    g.beginPath(); g.moveTo(0, s * 0.36); g.lineTo(0, s * 0.5); g.stroke();

    // ---- front hands resting at the bottom ----
    for (const dir of [-1, 1]) {
      g.strokeStyle = shade(color, -14); g.lineWidth = s * 0.2;
      const sX = dir * s * 0.22, sY = s * 0.82;
      const fX = dir * (s * 0.38 + s * 0.25 * ext), fY = s * 1.16 + s * 0.15 * ext;
      g.beginPath(); g.moveTo(sX, sY); g.quadraticCurveTo(dir * s * 0.45, s * 1.05, fX, fY); g.stroke();
      webFoot(g, fX, fY, dir, s * 0.22, color);
    }

    // ---- eyes: big domes seated on top of the head (they blink) ----
    const open = Math.max(0.04, 1 - blink);
    for (const dir of [-1, 1]) {
      const ex = dir * s * 0.42, ey = -s * 0.66, er = s * 0.46;
      // dome, blended into the head colour with a darker outline
      g.beginPath(); g.arc(ex, ey, er, 0, Math.PI * 2);
      g.fillStyle = shade(color, 10); g.fill();
      g.lineWidth = s * 0.06; g.strokeStyle = dk; g.stroke();
      // eyeball group — squashes vertically as the lid closes
      g.save();
      g.translate(ex, ey - er * 0.04);
      g.scale(1, open);
      g.beginPath(); g.arc(0, 0, er * 0.68, 0, Math.PI * 2);
      g.fillStyle = "#fdfff7"; g.fill();
      g.beginPath(); g.arc(0, er * 0.1, er * 0.44, 0, Math.PI * 2);
      g.fillStyle = "#e3c04a"; g.fill();                       // golden iris
      g.beginPath(); g.arc(0, er * 0.1, er * 0.25, 0, Math.PI * 2);
      g.fillStyle = "#15100f"; g.fill();                       // pupil
      g.beginPath(); g.arc(-er * 0.2, -er * 0.18, er * 0.14, 0, Math.PI * 2);
      g.fillStyle = "#fff"; g.fill();                          // glint
      g.restore();
      // eyelid line — becomes a happy lash when mostly shut
      if (blink > 0.12) {
        g.strokeStyle = dk; g.lineWidth = s * 0.07; g.lineCap = "round";
        g.beginPath();
        g.moveTo(ex - er * 0.62, ey - er * 0.05);
        g.quadraticCurveTo(ex, ey + er * 0.06 * blink, ex + er * 0.62, ey - er * 0.05);
        g.stroke();
      }
      // upper eyelid rim
      g.beginPath(); g.arc(ex, ey - er * 0.02, er * 0.92, Math.PI * 1.08, Math.PI * 1.92);
      g.lineWidth = s * 0.07; g.strokeStyle = shade(color, -18); g.stroke();
    }

    // ---- nostrils, mouth, cheeks ----
    g.fillStyle = dker;
    g.beginPath(); g.arc(-s * 0.12, -s * 0.16, s * 0.045, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(s * 0.12, -s * 0.16, s * 0.045, 0, Math.PI * 2); g.fill();
    // wide friendly smile with little upturned corners
    g.strokeStyle = dker; g.lineWidth = s * 0.1; g.lineCap = "round";
    g.beginPath(); g.arc(0, -s * 0.04, s * 0.48, 0.13 * Math.PI, 0.87 * Math.PI); g.stroke();
    g.fillStyle = "rgba(255,150,170,.28)";
    g.beginPath(); g.ellipse(-s * 0.58, s * 0.02, s * 0.17, s * 0.12, 0, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.ellipse(s * 0.58, s * 0.02, s * 0.17, s * 0.12, 0, 0, Math.PI * 2); g.fill();
  }

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) + amt, g = ((n >> 8) & 255) + amt, b = (n & 255) + amt;
    r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  function drawGroodleAt(gr) {
    const S = groodleSize(), tip = groodleTip(gr);
    ctx.save();
    ctx.translate(tip.x, tip.y);
    if (gr.side === "right") ctx.scale(-1, 1); // mirror so the snout points inward
    // soft shadow she casts on the water
    ctx.save();
    ctx.globalAlpha = 0.14; ctx.translate(S * 0.1, S * 0.55); ctx.scale(1, 0.5);
    ctx.beginPath(); ctx.arc(-S * 1.6, 0, S * 1.7, 0, Math.PI * 2);
    ctx.fillStyle = "#000"; ctx.fill();
    ctx.restore();
    drawGroodle(ctx, S);
    ctx.restore();
  }

  // Drawn with her wet nose tip at the origin, snout pointing +x (into the pond),
  // fluffy head + body trailing off to -x (past the screen edge).
  function drawGroodle(g, S) {
    // ---- floppy ear draping down the side of the head ----
    g.beginPath();
    g.moveTo(-S * 2.0, -S * 0.5);
    g.quadraticCurveTo(-S * 3.0, S * 0.2, -S * 2.7, S * 1.7);
    g.quadraticCurveTo(-S * 2.2, S * 2.2, -S * 1.7, S * 1.4);
    g.quadraticCurveTo(-S * 1.6, S * 0.4, -S * 1.7, -S * 0.3);
    g.closePath();
    g.fillStyle = "#e6eaf2"; g.fill();

    // ---- shaggy white fur: an elongated snout, a head, and shoulders/body ----
    const puffs = [
      // snout / muzzle (tapered)
      [-0.55, 0.12, 0.44], [-1.0, 0.06, 0.55], [-1.5, 0.0, 0.68],
      // head
      [-2.35, -0.15, 1.18], [-3.05, 0.0, 1.32], [-2.7, -1.05, 0.82], [-2.0, -0.7, 0.66],
      // shoulders / chest / body mass
      [-3.4, 0.95, 1.2], [-2.75, 1.2, 0.95], [-2.05, 0.9, 0.72], [-3.9, 0.2, 1.05],
      // shaggy scallops on top
      [-2.45, -1.5, 0.5], [-3.15, -1.25, 0.58],
    ];
    g.fillStyle = "#ffffff";
    for (const p of puffs) { g.beginPath(); g.arc(S * p[0], S * p[1], S * p[2], 0, Math.PI * 2); g.fill(); }
    // volume shading
    const vol = g.createRadialGradient(-S * 2.0, -S * 1.0, S * 0.4, -S * 1.6, S * 0.5, S * 3.6);
    vol.addColorStop(0, "rgba(255,255,255,0)");
    vol.addColorStop(1, "rgba(196,206,222,0.5)");
    g.fillStyle = vol;
    for (const p of puffs) { g.beginPath(); g.arc(S * p[0], S * p[1], S * p[2], 0, Math.PI * 2); g.fill(); }

    // ---- under-muzzle shadow ----
    g.beginPath(); g.ellipse(-S * 0.7, S * 0.4, S * 0.8, S * 0.3, 0, 0, Math.PI * 2);
    g.fillStyle = "rgba(198,208,224,0.4)"; g.fill();

    // ---- red collar + bow tie at the throat ----
    const RED = "#d23b3b", REDK = "#a02626", REDL = "#e86a6a";
    // collar band hugging the neck under the head
    g.strokeStyle = RED; g.lineWidth = S * 0.34; g.lineCap = "round";
    g.beginPath();
    g.moveTo(-S * 3.35, S * 0.7);
    g.quadraticCurveTo(-S * 2.4, S * 1.6, -S * 1.2, S * 1.0);
    g.stroke();
    g.strokeStyle = REDK; g.lineWidth = S * 0.06;
    g.beginPath();
    g.moveTo(-S * 3.3, S * 0.85);
    g.quadraticCurveTo(-S * 2.4, S * 1.72, -S * 1.25, S * 1.14);
    g.stroke();
    // bow tie at the front of the collar
    const bx = -S * 1.75, by = S * 1.12;
    g.fillStyle = RED;
    g.beginPath(); // left wing
    g.moveTo(bx - S * 0.08, by);
    g.lineTo(bx - S * 0.75, by - S * 0.42);
    g.lineTo(bx - S * 0.75, by + S * 0.42);
    g.closePath(); g.fill();
    g.beginPath(); // right wing
    g.moveTo(bx + S * 0.08, by);
    g.lineTo(bx + S * 0.75, by - S * 0.42);
    g.lineTo(bx + S * 0.75, by + S * 0.42);
    g.closePath(); g.fill();
    g.fillStyle = REDL; // little highlight on each wing
    g.beginPath(); g.moveTo(bx - S * 0.12, by); g.lineTo(bx - S * 0.6, by - S * 0.28); g.lineTo(bx - S * 0.6, by + S * 0.02); g.closePath(); g.fill();
    g.beginPath(); g.moveTo(bx + S * 0.12, by); g.lineTo(bx + S * 0.6, by - S * 0.28); g.lineTo(bx + S * 0.6, by + S * 0.02); g.closePath(); g.fill();
    g.fillStyle = REDK; // knot
    g.beginPath(); g.ellipse(bx, by, S * 0.16, S * 0.24, 0, 0, Math.PI * 2); g.fill();

    // ---- black button eyes ----
    for (const e of [[-1.2, -0.35, 0.3], [-1.9, -0.48, 0.34]]) {
      const ex = S * e[0], ey = S * e[1], er = S * e[2];
      g.beginPath(); g.ellipse(ex, ey, er * 0.86, er, 0, 0, Math.PI * 2);
      g.fillStyle = "#141118"; g.fill();
      g.beginPath(); g.arc(ex - er * 0.28, ey - er * 0.34, er * 0.26, 0, Math.PI * 2);
      g.fillStyle = "#ffffff"; g.fill();                       // catch-light
      // shaggy brow tuft above the eye
      g.strokeStyle = "#f1f4f9"; g.lineWidth = S * 0.17; g.lineCap = "round";
      g.beginPath(); g.moveTo(ex - er * 1.0, ey - er * 1.1); g.lineTo(ex + er * 0.4, ey - er * 1.35); g.stroke();
    }

    // ---- big pink nose at the tip ----
    const nx = -S * 0.26, ny = S * 0.06;
    const ng = g.createRadialGradient(nx - S * 0.12, ny - S * 0.14, S * 0.04, nx, ny, S * 0.42);
    ng.addColorStop(0, "#ffc4dc"); ng.addColorStop(0.5, "#f58fb6"); ng.addColorStop(1, "#e06a97");
    g.beginPath(); g.ellipse(nx, ny, S * 0.38, S * 0.33, 0, 0, Math.PI * 2);
    g.fillStyle = ng; g.fill();
    g.fillStyle = "#b64f7c"; // nostrils
    g.beginPath(); g.ellipse(nx - S * 0.02, ny - S * 0.06, S * 0.05, S * 0.08, -0.3, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.ellipse(nx + S * 0.16, ny - S * 0.02, S * 0.05, S * 0.08, 0.3, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.ellipse(nx - S * 0.13, ny - S * 0.13, S * 0.1, S * 0.07, -0.5, 0, Math.PI * 2);
    g.fillStyle = "rgba(255,255,255,.7)"; g.fill();           // shine
    // little smile under the nose
    g.strokeStyle = "#b98aa0"; g.lineWidth = S * 0.05; g.lineCap = "round";
    g.beginPath(); g.moveTo(nx - S * 0.02, ny + S * 0.3);
    g.quadraticCurveTo(-S * 0.6, S * 0.66, -S * 0.95, S * 0.45); g.stroke();
  }

  let waterT = 0;
  function render() {
    waterT += 0.016;
    drawWater();

    // ripples (behind creatures)
    for (const rp of ripples) {
      ctx.globalAlpha = Math.max(0, rp.life) * 0.6;
      ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      ctx.strokeStyle = rp.color; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // creatures: swimmers first, hoppers on top
    for (const c of creatures) {
      if (c.stage === 3) {
        const hp = c.hop;
        // tuck legs during the crouch, kick hard at launch, then trail
        const legKick = hp.phase === "crouch" ? -0.5 * hp.crouch : Math.max(-0.1, 1 - hp.t * 3.5);
        drawCreature(ctx, c.x, c.y, c.r, c.stage, c.color, c.wiggle, c.pop, hp.rot, hp.crouch, legKick, c.blink);
      } else {
        drawCreature(ctx, c.x, c.y, c.r, c.stage, c.color, c.wiggle, c.pop, 0, 0, 0, c.blink);
      }
    }

    for (const s of sparkles) {
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (groodle) drawGroodleAt(groodle); // she pokes in over the top of the pond
  }

  function loop(t) {
    if (!running) return;
    const dt = Math.min(0.05, Math.max(0, (t - lastT) / 1000));
    lastT = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function startGame() {
    ensureAudio();
    creatures = []; ripples = []; sparkles = [];
    groodle = null; groodleTimer = rand(6, 10);
    score = 0; frogsFreed = 0; spawnAcc = 0;
    for (let i = 0; i < 6; i++) spawnTadpole();
    updateHUD();
    el.start.classList.add("hidden");
    el.end.classList.add("hidden");
    running = true; lastT = performance.now();
    requestAnimationFrame(loop);
  }

  // input
  function handlePoint(e) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    tapAt(cx, cy);
  }
  canvas.addEventListener("mousedown", handlePoint);
  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handlePoint(e); }, { passive: false });

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("againBtn").addEventListener("click", startGame);

  // ---------- start-screen stage demos ----------
  const demoCanvases = [...document.querySelectorAll(".demo")];
  let demoT = 0;
  function drawDemos() {
    demoT += 0.03;
    for (const dc of demoCanvases) {
      const g = dc.getContext("2d");
      g.clearRect(0, 0, dc.width, dc.height);
      const stage = +dc.dataset.stage;
      const hopY = stage === 3 ? -Math.abs(Math.sin(demoT * 2)) * 14 : 0;
      const legKick = stage === 3 ? Math.max(0, Math.sin(demoT * 2)) * 0.8 : 0;
      // periodic blink for the demo frogs
      const bt = demoT % 3;
      const blink = bt < 0.16 ? (bt < 0.08 ? bt / 0.08 : 1 - (bt - 0.08) / 0.08) : 0;
      drawCreature(g, 40, 44 + hopY, 14, stage, "#7dffa8", demoT * 6, 0,
        stage === 3 ? Math.sin(demoT) * 0.25 : 0, 0, legKick, blink);
    }
    if (!running) requestAnimationFrame(drawDemos);
  }
  drawDemos();
})();
</script>
</body>
</html>
